{% if recent_runs %}
<div class="overview-run-list">
    {% for run in recent_runs %}
    <div class="overview-run-item">
        <div class="overview-run-summary">
            <div class="overview-run-time">{{ run.started_at | datefmt }}</div>
            <div class="overview-run-task">{{ run.task_type }}</div>
            <div><span class="badge badge-{{ run.status }}">{{ run.status }}</span></div>
            <div class="overview-run-duration">{{ "%.1f" | format(run.duration_seconds or 0) }}s</div>
        </div>
        <div class="overview-run-detail">{{ run.detail or '(no detail)' }}</div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-8 opacity-50 text-sm">No runs recorded yet</div>
{% endif %}
